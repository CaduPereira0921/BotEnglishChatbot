<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>English Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; }
        .chat-container { width: 400px; background: #16213e; border-radius: 12px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .chat-header { background: #0f3460; padding: 16px; text-align: center; color: #e94560; font-size: 18px; font-weight: bold; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; font-size: 14px; }
        .user { background: #0f3460; color: #fff; align-self: flex-end; }
        .bot { background: #533483; color: #fff; align-self: flex-start; }
        .chat-input { display: flex; padding: 12px; background: #0f3460; }
        .chat-input input { flex: 1; padding: 10px; border: none; border-radius: 8px; outline: none; font-size: 14px; }
        .chat-input button { margin-left: 8px; padding: 10px 16px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .chat-input button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 English Chatbot</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your message..." 
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, "user");
            input.value = "";

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            addMessage(data.response, "bot");
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.textContent = text;
            const container = document.getElementById("messages");
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
